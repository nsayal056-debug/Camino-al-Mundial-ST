<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Camino al Mundial - Preguntas</title>

    <link rel="stylesheet"
          href="./Css/styles.css">

</head>

<body class="pagina-preguntas">

    <main class="pantalla-preguntas">

        <section class="contenedor-juego">

            <h1>⚽ Camino al Mundial ⚽</h1>

            <div class="progreso">

                <p id="contador">
                    Pregunta 1 de 10
                </p>

                <div class="barra-progreso">

                    <div id="avance"></div>

                </div>

            </div>

            <div class="pregunta-card">

                <h2 id="pregunta">
                    Aquí aparecerá la pregunta
                </h2>

                <div id="opciones"
                     class="opciones">

                    <button class="opcion">
                        Opción 1
                    </button>

                    <button class="opcion">
                        Opción 2
                    </button>

                    <button class="opcion">
                        Opción 3
                    </button>

                    <button class="opcion">
                        Opción 4
                    </button>

                </div>

                <p id="mensaje">
                    <!-- Correcto o Incorrecto -->
                </p>

            </div>

            <div class="acciones">

                <button id="btn-siguiente">
                    Siguiente
                </button>

            </div>

        </section>

    </main>

    <script src="./js/main.js"></script>

</body>

</html>
